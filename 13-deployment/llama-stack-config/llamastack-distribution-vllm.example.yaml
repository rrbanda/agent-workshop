apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: llamastack-distribution-vllm
spec:
  replicas: 1
  server:
    distribution:
      name: starter
    containerSpec:
      env:
      - name: VLLM_URL
        value: "https://some_url/v1"
      - name: VLLM_API_TOKEN
        value: "some_token"
    storage:
      size: "20Gi"
      mountPath: "/home/lls/.lls"
